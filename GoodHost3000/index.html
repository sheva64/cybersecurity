<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SecureMail Pro</title>
    <link rel="stylesheet" href="http://localhost:6001/theme.css">
</head>
<body>
    <header>
        <div class="logo-container">
            <img src="http://localhost:6001/logo.png" alt="Logo">
        </div>
        <div>
            <span id="username">Guest</span>
            <button id="logout-btn" style="display: none; margin-left: 15px; padding: 5px 10px; cursor: pointer;">Logout</button>
        </div>
    </header>

    <div id="login-section" style="padding: 20px; text-align: center;">
        <h2>Login to SecureMail Pro</h2>
        <input type="text" id="login-username">
        <input type="password" id="login-password">
        <button id="login-btn">Login</button>
    </div>

    <div id="email-container" style="display: none;">
        <aside id="sidebar">
            <h3>Incoming letters:</h3>
            <ul id="email-list"></ul>
        </aside>
        <main id="email-content">
            <p>Select a mail from the list to read it.</p>
        </main>
    </div>

    <div id="support-chat"></div>

    <script src="main.js" type="module"></script>
    <script src="http://localhost:6001/react-mock.js"></script>
    <script src="http://localhost:4000/support.js"></script>
    <script src="http://localhost:5000/weather.js"></script>
</body>
</html>
